<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kalorio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    #uploadBtn {
      background: #4CAF50;
      color: white;
    }

    #analyzeBtn {
      background: #2196F3;
      color: white;
      margin-top: 10px;
    }

    #preview {
      margin-top: 20px;
      max-width: 90%;
      border-radius: 12px;
      display: none;
    }

    #loader {
      margin-top: 20px;
      display: none;
      font-size: 18px;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 15px;
      background: #1c1c1c;
      width: 90%;
      display: none;
    }

    .card {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: #2a2a2a;
    }
  </style>
</head>

<body>

<h1>🍽 Kalorio</h1>

<input type="file" id="fileInput" accept="image/*" style="display:none"/>

<button id="uploadBtn" onclick="pickFile()">📸 Выбрать фото</button>

<img id="preview"/>

<button id="analyzeBtn" onclick="sendImage()">🔍 Анализировать</button>

<div id="loader">⏳ Анализируем...</div>

<div id="result"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

function pickFile() {
  document.getElementById("fileInput").click();
}

const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
});

async function sendImage() {
  const file = fileInput.files[0];

  if (!file) {
    alert("Выбери фото");
    return;
  }

  document.getElementById("loader").style.display = "block";
  document.getElementById("result").style.display = "none";
  document.getElementById("analyzeBtn").disabled = true;

  const formData = new FormData();
  formData.append("image", file);

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("loader").style.display = "none";
    document.getElementById("analyzeBtn").disabled = false;

    const resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";

    resultDiv.innerHTML = `
      <h2>${data.food}</h2>
      <div class="card">🔥 Калории: ${data.calories}</div>
      <div class="card">🥩 Белки: ${data.protein}</div>
      <div class="card">🧈 Жиры: ${data.fat}</div>
      <div class="card">🍞 Углеводы: ${data.carbs}</div>
    `;
  } catch (err) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("analyzeBtn").disabled = false;
    alert("Ошибка анализа");
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalorio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f4d3c;
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    img {
      width: 100%;
      border-radius: 20px;
    }

    h1 {
      font-size: 36px;
      margin: 20px 0 10px;
    }

    p {
      opacity: 0.8;
    }

    button {
      margin-top: 40px;
      padding: 15px;
      width: 90%;
      border-radius: 30px;
      border: none;
      font-size: 18px;
      cursor: pointer;
    }

    .start-btn {
      background: white;
      color: black;
    }

    .upload-btn {
      background: white;
      color: black;
    }

  </style>
</head>

<body>

  <!-- Welcome Screen -->
  <div id="welcome" class="container hidden">
    <h1>Калорио</h1>

    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" />

    <h1>Добро пожаловать в Калорио</h1>
    <p>Ваш персональный помощник в поддержании здорового образа жизни</p>

    <button class="start-btn" onclick="startApp()">Начать</button>
  </div>

  <!-- Home Screen -->
  <div id="home" class="container hidden">
    <h1>Загрузите фото еды</h1>

    <input type="file" id="fileInput" />

    <br />

    <button class="upload-btn" onclick="analyze()">Анализировать</button>

    <pre id="result"></pre>
  </div>

  <script>
    function startApp() {
      localStorage.setItem("started", "true");
      showHome();
    }

    function showHome() {
      document.getElementById("welcome").classList.add("hidden");
      document.getElementById("home").classList.remove("hidden");
    }

    function showWelcome() {
      document.getElementById("welcome").classList.remove("hidden");
      document.getElementById("home").classList.add("hidden");
    }

    async function analyze() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return alert("Выберите фото");

      const formData = new FormData();
      formData.append("image", file);

      const res = await fetch("/analyze", {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      document.getElementById("result").textContent = JSON.stringify(data, null, 2);
    }

    // Проверка при загрузке
    if (localStorage.getItem("started")) {
      showHome();
    } else {
      showWelcome();
    }
  </script>

</body>
</html>

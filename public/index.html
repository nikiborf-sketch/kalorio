<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalorio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter Tight', sans-serif;
      background: #0b4d3a;
      color: white;
      display: flex;
      justify-content: center;
    }

    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      display: none;
      flex-direction: column;
    }

    .active {
      display: flex;
    }

    .logo {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
    }

    img {
      width: 100%;
      border-radius: 20px;
      margin-top: 20px;
    }

    .title {
      text-align: center;
      margin-top: 30px;
    }

    .title span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-top: 10px;
    }

    button {
      margin-top: auto;
      padding: 15px;
      border-radius: 30px;
      border: none;
      font-size: 18px;
    }

    .white {
      background: white;
      color: black;
    }

    .card {
      background: white;
      color: black;
      border-radius: 15px;
      padding: 10px;
      margin-top: 10px;
    }

    .popup {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      color: black;
      padding: 20px;
      display: none;
      border-radius: 20px 20px 0 0;
    }

    .popup button {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen">
  <div class="logo">Калорио</div>

  <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">

  <div class="title">
    Добро пожаловать в
    <span>Калорио</span>
  </div>

  <div class="subtitle">
    Ваш помощник в здоровом питании
  </div>

  <button class="white" onclick="start()">Начать</button>
</div>

<!-- HOME -->
<div id="home" class="screen">

  <div class="logo">Калорио</div>

  <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">

  <div class="card">Всего: <span id="total">0</span></div>
  <div class="card">Завтрак: <span id="breakfast">0</span></div>
  <div class="card">Обед: <span id="lunch">0</span></div>
  <div class="card">Ужин: <span id="dinner">0</span></div>

  <button class="white" onclick="pickImage()">Отсканировать</button>

</div>

<input type="file" id="fileInput" hidden onchange="handleFile(event)" />

<div class="popup" id="popup">
  <div>Куда добавить?</div>
  <button onclick="addMeal('breakfast')">Завтрак</button>
  <button onclick="addMeal('lunch')">Обед</button>
  <button onclick="addMeal('dinner')">Ужин</button>
</div>

<script>

let meals = { breakfast: [], lunch: [], dinner: [] };
let lastResult = null;

function start() {
  localStorage.setItem("started", "true");
  showHome();
}

function showHome() {
  document.getElementById("welcome").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

function showWelcome() {
  document.getElementById("home").classList.remove("active");
  document.getElementById("welcome").classList.add("active");
}

function pickImage() {
  document.getElementById("fileInput").click();
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch("/analyze", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  lastResult = data;
  document.getElementById("popup").style.display = "block";
}

function addMeal(type) {
  meals[type].push(lastResult);
  document.getElementById("popup").style.display = "none";
  updateUI();
}

function updateUI() {
  const b = sum(meals.breakfast);
  const l = sum(meals.lunch);
  const d = sum(meals.dinner);

  document.getElementById("breakfast").innerText = b;
  document.getElementById("lunch").innerText = l;
  document.getElementById("dinner").innerText = d;
  document.getElementById("total").innerText = b + l + d;
}

function sum(arr) {
  return arr.reduce((a, i) => a + (i.calories || 0), 0);
}

// запуск
if (localStorage.getItem("started")) {
  showHome();
} else {
  showWelcome();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalorio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter Tight', sans-serif;
      background: #0b4d3a;
      color: white;
      display: flex;
      justify-content: center;
    }

    .screen {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      display: none;
      flex-direction: column;
    }

    .active {
      display: flex;
    }

    .logo {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
    }

    img {
      width: 100%;
      border-radius: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 15px;
      padding: 15px;
      margin-top: 10px;
      text-align: center;
    }

    .row {
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }

    button {
      margin-top: auto;
      padding: 15px;
      border-radius: 30px;
      border: none;
      font-size: 18px;
      background: white;
      color: black;
    }

    .popup {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      color: black;
      padding: 20px;
      display: none;
      border-radius: 20px 20px 0 0;
    }

    .popup button {
      width: 100%;
      margin-top: 10px;
    }

    .big {
      font-size: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen">
  <div class="logo">Калорио</div>
  <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
  <div class="card">Добро пожаловать в Калорио</div>
  <button onclick="start()">Начать</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
  <div class="logo">Калорио</div>

  <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">

  <div class="card">Всего: <span id="total">0</span> ккал</div>
  <div class="card">Завтрак: <span id="breakfast">0</span></div>
  <div class="card">Обед: <span id="lunch">0</span></div>
  <div class="card">Ужин: <span id="dinner">0</span></div>

  <button onclick="pickImage()">Отсканировать</button>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="logo">Калорио</div>

  <img id="resultImage">

  <div class="card">
    <div id="foodName">...</div>
    <div id="calories" class="big">0 ккал</div>
  </div>

  <div class="card row">
    <div>Белки: <span id="protein">0</span></div>
    <div>Жиры: <span id="fat">0</span></div>
    <div>Углеводы: <span id="carbs">0</span></div>
  </div>

  <button onclick="confirmAdd()">Добавить</button>
  <button onclick="retake()">Переснять</button>
</div>

<input type="file" id="fileInput" hidden onchange="handleFile(event)" />

<div class="popup" id="popup">
  <div>Куда добавить?</div>
  <button onclick="selectMeal('breakfast')">Завтрак</button>
  <button onclick="selectMeal('lunch')">Обед</button>
  <button onclick="selectMeal('dinner')">Ужин</button>
</div>

<script>

let meals = { breakfast: [], lunch: [], dinner: [] };
let lastResult = null;
let lastImage = null;

// НАВИГАЦИЯ

function start() {
  localStorage.setItem("started", "true");
  showHome();
}

function showHome() {
  hideAll();
  document.getElementById("home").classList.add("active");
}

function showWelcome() {
  hideAll();
  document.getElementById("welcome").classList.add("active");
}

function showResult() {
  hideAll();
  document.getElementById("result").classList.add("active");
}

function hideAll() {
  document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
}

// 🔥 СТАРТ БЕЗ БАГОВ
window.onload = () => {
  try {
    if (localStorage.getItem("started")) {
      showHome();
    } else {
      showWelcome();
    }
  } catch (e) {
    showWelcome();
